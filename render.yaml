services:
  - type: web
    name: api-staging
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter api build
    startCommand: pnpm --filter api start:prod
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: staging
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,https://ondemand-logistics-platform-web.vercel.app,https://ondemand-logistics-platform-web-xthetic-studios-projects.vercel.app
      - key: CORS_ALLOWED_VERCEL_PROJECTS
        value: ondemand-logistics-platform,ondemand-logistics-platform-web

  - type: worker
    name: worker-staging
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter worker build
    startCommand: pnpm --filter worker start:prod
    envVars:
      - key: APP_ENV
        value: staging
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OUTBOX_POLL_INTERVAL_MS
        value: 2000
      - key: OUTBOX_BATCH_SIZE
        value: 20
